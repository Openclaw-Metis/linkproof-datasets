name: Validate dataset

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dataset dependencies
        run: python3 -m pip install -r scripts/requirements.txt

      - name: Compile dataset scripts
        run: python3 -m py_compile scripts/build_dataset.py scripts/update_manifest.py scripts/fetch_phishtank.py scripts/merge_sources.py scripts/normalize_domain.py

      - name: Run dataset tests
        run: python3 -m pytest tests/

      - name: Validate dataset and manifest
        run: python3 scripts/update_manifest.py

      - name: Validate release metadata
        run: python3 -m json.tool publications.json > /dev/null

      - name: Ensure manifest is committed
        run: git diff --exit-code manifest.json
